<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Prompt Studio - 프롬프트 메이커</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;700&family=Nanum+Gothic+Coding:wght@400;700&family=Noto+Serif+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="configs.js"></script>
    <script src="presets.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo-area">
                <i class="fa-solid fa-wand-magic-sparkles logo-icon"></i>
                <h2>Prompt Studio</h2>
            </div>
            
            <!-- Dynamic Sidebar Steps will be injected here -->
            <nav class="steps-nav">
                <ul id="dynamic-steps-nav">
                    <!-- Injected by JS -->
                </ul>
            </nav>

            <!-- Selected Artist Style Box -->
            <div id="selected-artist-style-box" class="selected-artist-style-box" style="display: none;">
                <div class="artist-style-header">
                    <span><i class="fa-solid fa-palette"></i> <span id="artist-style-name">Wes Anderson</span></span>
                    <button id="btn-clear-artist-style" title="선택 해제"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <img id="artist-style-img" class="artist-style-img" src="" alt="Artist Style Reference">
            </div>

            <div class="sidebar-footer">
                <div class="hashtag-container">
                    <span class="hash-tag">#Synopsis</span>
                    <span class="hash-tag">#Outline</span>
                    <span class="hash-tag">#Script</span>
                    <span class="hash-tag">#Storyboard</span>
                    <span class="hash-tag">#Shot List</span>
                </div>
                <button id="btn-fill-all" class="btn-secondary">
                    <i class="fa-solid fa-bolt"></i> 예시 전체 채우기
                </button>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="workspace">
            <header class="main-header">
                <div class="header-info">
                    <div class="title-with-toggle">
                        <h1 id="app-title">AI Video Prompt Generator</h1>
                        <div class="mode-toggle-group">
                            <button id="mode-video" class="btn-mode active" data-mode="video">
                                <i class="fa-solid fa-video"></i> 비디오
                            </button>
                            <button id="mode-image" class="btn-mode" data-mode="image">
                                <i class="fa-solid fa-image"></i> 이미지
                            </button>
                        </div>
                    </div>
                    <p id="app-subtitle">영상의 목적에 맞게 단계별 세부 요소를 입력하여 고품질 AI 영상 프롬프트를 완성하세요.</p>
                </div>
                <button id="btn-theme-toggle" class="btn-theme-toggle" title="화면 테마 변경">
                    <i class="fa-solid fa-moon"></i>
                </button>
                <div class="progress-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
            </header>

            <div class="workspace-content">
                <!-- Form Area -->
                <section class="form-section">
                    

                    <!-- Purpose Selector Bar -->
                    <div id="purpose-selector-container" class="purpose-selector-container">
                        <!-- Dynamic Purpose Cards Grid will be injected here by JS -->
                    </div>
                    <!-- Preset Selector Bar -->
                    <div id="preset-selector-container" class="preset-selector-container">
                        <label for="preset-select"><i class="fa-solid fa-wand-magic-sparkles"></i> 프리셋 불러오기:</label>
                        <select id="preset-select" class="form-control preset-select">
                            <option value="">-- 프리셋을 선택하여 폼을 자동으로 채우기 --</option>
                        </select>
                    </div>

                    <!-- Artist Style Selector Bar -->
                    <div id="artist-style-selector-container" class="preset-selector-container" style="margin-top: 10px;">
                        <label for="artist-style-select"><i class="fa-solid fa-palette"></i> 작가스타일 레퍼런스:</label>
                        <select id="artist-style-select" class="form-control preset-select">
                            <option value="">-- 작가스타일을 선택하여 스타일 관련 필드에 적용 --</option>
                        </select>
                    </div>


                    <!-- Dynamic Form Cards Container -->
                    <div id="dynamic-form-container">
                        <!-- Step Cards (1 to 9) will be injected dynamically by JS -->
                    </div>

                    <!-- Step 10 Card (Assemble & Copy) - Always Common -->
                    <div class="step-card" id="step-card-final">
                        <div class="card-header">
                            <span class="badge" id="final-badge">Step 10</span>
                            <h2>최종 조립 및 출력</h2>
                            <p>선택된 목적의 조립 구조를 바탕으로 완성된 최종 프롬프트입니다.</p>
                        </div>
                        <div class="card-body">
                            <div class="output-options">
                                <button id="btn-copy-prompt" class="btn-primary btn-block">
                                    <i class="fa-solid fa-copy"></i> 프롬프트 복사하기
                                </button>
                                <button id="btn-reset" class="btn-danger btn-block">
                                    <i class="fa-solid fa-rotate-left"></i> 초기화
                                </button>
                            </div>
                            <div class="output-preview-container">
                                <textarea id="final-output-textarea" readonly class="form-control final-output-area"></textarea>
                            </div>
                        </div>
                    </div>

                    <!-- Navigation Footer -->
                    <div class="nav-footer">
                        <button id="btn-prev" class="btn-nav btn-secondary" disabled>
                            <i class="fa-solid fa-chevron-left"></i> 이전
                        </button>
                        <div class="step-indicator">
                            <span id="current-step-indicator">1</span> / <span id="total-steps-indicator">10</span>
                        </div>
                        <button id="btn-next" class="btn-nav btn-primary">
                            다음 <i class="fa-solid fa-chevron-right"></i>
                        </button>
                    </div>
                </section>

                <!-- Live Preview Area -->
                <section class="preview-section">
                    <div class="preview-card">
                        <div class="preview-header">
                            <h3><i class="fa-solid fa-eye"></i> 실시간 프롬프트 프리뷰</h3>
                            <button id="btn-load-current-example" class="btn-small-secondary">
                                <i class="fa-solid fa-wand-magic-sparkles"></i> 현재 단계 예시 채우기
                            </button>
                        </div>
                        <div class="preview-body" id="prompt-preview-content">
                            <!-- JS will inject formatted preview text here -->
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Notification Container for Toast Messages -->
    <div id="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
